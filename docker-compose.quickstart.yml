services:
  baton:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BATON_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      BATON_HOME: "/baton"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - "${BATON_DATA_DIR:-./data/docker-baton}:/baton"
