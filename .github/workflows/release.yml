name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          awk -v ver="${{ steps.version.outputs.version }}" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") found=1
              next
            }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "No CHANGELOG section found for version ${{ steps.version.outputs.version }}" >&2
            exit 1
          fi

          prev_tag="$(git tag --sort=-version:refname | grep -Fxv "$GITHUB_REF_NAME" | head -n 1 || true)"

          # Append full changelog link
          echo "" >> /tmp/release-notes.md
          if [ -n "$prev_tag" ]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev_tag}...${GITHUB_REF_NAME}" >> /tmp/release-notes.md
          else
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}" >> /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
