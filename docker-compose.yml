services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: baton
      POSTGRES_PASSWORD: baton
      POSTGRES_DB: baton
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://baton:baton@db:5432/baton
      PORT: "3100"
      SERVE_UI: "true"
    depends_on:
      - db

volumes:
  pgdata:
