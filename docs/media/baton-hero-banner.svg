<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Baton Hero Banner</title>
  <desc id="desc">A dark control-room style product banner showing approvals, governed ticket execution, budgets, review, and pull request handoff.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#121A30"/>
      <stop offset="1" stop-color="#09111D"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17233A"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="warning" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>
  <g opacity="0.14">
    <path d="M0 70H1280" stroke="#94A3B8"/>
    <path d="M0 140H1280" stroke="#94A3B8"/>
    <path d="M0 210H1280" stroke="#94A3B8"/>
    <path d="M0 280H1280" stroke="#94A3B8"/>
    <path d="M0 350H1280" stroke="#94A3B8"/>
    <path d="M0 420H1280" stroke="#94A3B8"/>
    <path d="M0 490H1280" stroke="#94A3B8"/>
    <path d="M0 560H1280" stroke="#94A3B8"/>
    <path d="M110 0V640" stroke="#94A3B8"/>
    <path d="M250 0V640" stroke="#94A3B8"/>
    <path d="M390 0V640" stroke="#94A3B8"/>
    <path d="M530 0V640" stroke="#94A3B8"/>
    <path d="M670 0V640" stroke="#94A3B8"/>
    <path d="M810 0V640" stroke="#94A3B8"/>
    <path d="M950 0V640" stroke="#94A3B8"/>
    <path d="M1090 0V640" stroke="#94A3B8"/>
  </g>

  <text x="70" y="98" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Baton</text>
  <text x="70" y="152" fill="white" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800">Governed control plane</text>
  <text x="70" y="208" fill="white" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800">for AI agent software teams</text>
  <text x="70" y="264" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">Approval gates, ticket isolation, budget controls, and real PR handoffs.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="330" width="260" height="210" rx="22" fill="url(#panel)" stroke="#24324A"/>
    <text x="98" y="372" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Governance Controls</text>
    <rect x="98" y="396" width="110" height="28" rx="14" fill="#0F3D2E"/>
    <text x="118" y="415" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Approval Gate</text>
    <rect x="98" y="440" width="204" height="14" rx="7" fill="#1E293B"/>
    <rect x="98" y="440" width="132" height="14" rx="7" fill="url(#accent)"/>
    <text x="98" y="476" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Budget control</text>
    <text x="240" y="476" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">62%</text>
    <rect x="98" y="498" width="92" height="26" rx="13" fill="#312E81"/>
    <text x="120" y="515" fill="#C4B5FD" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Audit Trail</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="296" width="520" height="248" rx="26" fill="url(#panel)" stroke="#24324A"/>
    <text x="414" y="338" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Governed Ticket Execution</text>

    <rect x="414" y="372" width="134" height="74" rx="18" fill="#111C33" stroke="#2B3A55"/>
    <text x="438" y="402" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Plan</text>
    <text x="438" y="425" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600">Leader proposes</text>

    <rect x="574" y="372" width="152" height="74" rx="18" fill="#10263A" stroke="#2B3A55"/>
    <text x="598" y="402" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Approve</text>
    <text x="598" y="425" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600">Board unlocks work</text>

    <rect x="752" y="372" width="114" height="74" rx="18" fill="#0E2A23" stroke="#285A4B"/>
    <text x="775" y="402" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Run</text>
    <text x="775" y="425" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600">In isolated cwd</text>

    <path d="M548 409H574" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
    <path d="M726 409H752" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>

    <rect x="414" y="470" width="452" height="42" rx="21" fill="#0C1426" stroke="#24324A"/>
    <text x="442" y="496" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">feature/AZAK-010</text>
    <text x="636" y="496" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">ticket-isolated execution workspace</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="938" y="330" width="272" height="210" rx="22" fill="url(#panel)" stroke="#24324A"/>
    <text x="968" y="372" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Delivery Handoff</text>
    <rect x="968" y="396" width="94" height="28" rx="14" fill="#172554"/>
    <text x="994" y="415" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Review</text>
    <rect x="1078" y="396" width="86" height="28" rx="14" fill="#3F1D2E"/>
    <text x="1105" y="415" fill="#FDA4AF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">PR Gate</text>
    <path d="M968 446H1182" stroke="#334155" stroke-width="2"/>
    <text x="968" y="480" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Real commit / push / PR</text>
    <rect x="968" y="498" width="168" height="18" rx="9" fill="#1E293B"/>
    <rect x="968" y="498" width="122" height="18" rx="9" fill="url(#warning)"/>
  </g>
</svg>
